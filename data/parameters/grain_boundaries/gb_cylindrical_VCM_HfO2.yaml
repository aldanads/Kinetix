# data/parameters/grain_boundaries/gb_cylindrical_VCM_HfO2.yaml
# =============================================================================
# Grain Boundary Configuration - Cylindrical
# =============================================================================
# A cylindrical grain boundary (e.g., columnar grain structure)
# =============================================================================

description: "Cylindrical grain boundary for columnar grain structure"

grain_boundaries:
  - type: "cylindrical"
    enabled: true
    center: [10.0, 10.0]                # [x, y] center position (angstroms)
    radius: 5.0                         # Inner radius (angstroms)
    outer_radius: 5.0                  # Outer radius including transition (angstroms)
    description: "Central cylindrical GB"
    
    event_modifications:
      migration:
        region: "outer_boundary"
        affected_defects: ["oxygen_interstitial"]
        Act_E_diff_GB: 2.7             # eV
      
      reaction:
        region: "outer_boundary"
        affected_reactions: ["frenkel_generation"]
        Act_E_diff_GB: 2.8             # eV