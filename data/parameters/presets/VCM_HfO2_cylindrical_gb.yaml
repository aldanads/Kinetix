# data/parameters/presets/VCM_HfO2_cylindrical_gb.yaml
# =============================================================================
# VCM Simulation - HfO2 with O_vac and O interstitial
# =============================================================================
# This is the MASTER configuration file that references all other configs.
# Edit this to change simulation-wide parameters.
# Edit referenced files to change specific components (defects, reactions, etc.)
# =============================================================================

metadata:
  name: "VCM_HfO2"
  description: "VCM Simulation - HfO2 with O_vac and O interstitial"
  author: "Samuel Aldana Delgado"

# -----------------------------------------------------------------------------
# Material Selection (from Materials Project)
# -----------------------------------------------------------------------------
material:
  name: "HfO2"
  mp_id: "mp-550893"
  radius_neighbors: 3.9
  epsilon_r: 23.0
  
# -----------------------------------------------------------------------------
# Crystal Structure
# -----------------------------------------------------------------------------
crystal:
  size: [20, 20, 20] # Angstroms (x, y, z)
  miller_indices: [0, 0, 1] # Surface orientation
  sites_generation_layer: null #"top_layer" or "bottom_layer"
  affected_site: "Empty"
  facets_type: null
  
  # Interstitial site generation parameters (Voronoi method)
  interstitial_generation:
    min_distance: 1.2 # Minimum distance from host atoms (angstroms)
    clustering_tol: 1.6 # Voronoi node clustering tolerange (angstroms)
    create_interstitial_xyz_file: True # Create a xyz file with the unit cell with the interstitial sites
  
# -----------------------------------------------------------------------------
# Experimental conditions
# -----------------------------------------------------------------------------
experimental:
  temperature: 300.0  # K  
# -----------------------------------------------------------------------------
# Component Configuration Files
# -----------------------------------------------------------------------------
# These files are loaded relative to data/parameters/
components:
  defects: "defects/VCM_HfO2_defects_config.yaml"
  reactions: "reactions/VCM_HfO2_reactions.yaml"
  grain_boundaries: "grain_boundaries/gb_cylindrical_VCM_HfO2.yaml"
  electrical: "electrical/electrical_RAMP_CYCLE.yaml"
  
# -----------------------------------------------------------------------------
# Simulation Settings (ALL simulation parameters in one place)
# -----------------------------------------------------------------------------
settings:
  simulation_type: "electronic_device"      
  technology: "VCM"                     
  mode: "interstitial"                  
  seed_rng: null                           
  save_data: true                      
  lammps_output: true
  activation_energies: "activation_energies/VCM_HfO2.json"
  output_path: '/home/Docs2/samuel.delgado/linuxhome/Documents/Simulators/VCM_outputs/'
  
# -----------------------------------------------------------------------------
# Superbasin Acceleration
# -----------------------------------------------------------------------------
superbasin:
  enabled_superbasin: true
  n_search_superbasin: 50
  time_step_limits: 1.0e-4        # s
  E_min: 0.5                      # eV
  energy_step: 0.05               # eV
  time_based_superbasin: true
  
# -----------------------------------------------------------------------------
# Poisson Solver
# -----------------------------------------------------------------------------
poisson:
  solve_Poisson: true 
  save_Poisson: False
  active_dipoles: 4
  screening_factor: 0.01
  
  conductivity:
    conductive_filament: 6.3e6          # S/m (conductive filament)
    dielectric: 1.0e-1 # S/m (dielectric)
    
    # Contact resistance at interfaces (optional)
    # Set to null to disable, or provide a value in S/m
    interface_top: null           # Ag-Ag (no real interface) ? disabled
    interface_bottom: 1.0e2       # Ag-ITO (real interface) ? enabled
  
# -----------------------------------------------------------------------------
# Heat Solver (optional)
# -----------------------------------------------------------------------------  
heat: 
  solve_heat: True
  save_heat: False
  thermal_conductivity:     
    kappa_dielectric: 2.5 # W/m-K
    kappa_metal: 300 # W/m-K
  specific_heat: 500.0            # J/kg-K
  density: 5000.0                 # kg/m3
  tau_thermal: null            # s -> Set to null to calculate through properties
  use_thermal_inertia: True
  
  
# -----------------------------------------------------------------------------
# Mesh Generation (Gmsh parameters)
# -----------------------------------------------------------------------------
mesh:
  # Domain settings
  gdim: 3                         # Spatial dimension (2 or 3)
  gmsh_model_rank: 0              # MPI rank for Gmsh initialization
  
  # Global mesh sizing
  mesh_size: 0.8                  # Anstroms - Coarse mesh size
  bounding_box_padding: 5.0       # Angtroms - Padding around atomic structure (x, y only)
  
  # Charge spreading (physical parameter)
  epsilon_gaussian_charge: 0.8    # Gaussian width for point charges
  
  # Adaptive refinement
  activate_mesh_refinement: true
  fine_mesh_size: 0.5             # Angstroms - Fine mesh size near defects
  refinement_radius: 2.0          # Angstroms - Radius of refinement sphere around each site
