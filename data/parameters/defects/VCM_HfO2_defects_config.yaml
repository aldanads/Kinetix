# Defect definitions
defects:
  oxygen_interstitial:
    symbol: "O_i"
    physical_element: "O"
    charge: -2
    site_type: "interstitial"
    allowed_sublattices: ["interstitial", "O"]
    initial_concentration_bulk: 0
    initial_concentration_GB: 0
    valid_target_species: ["Empty"]
    activation_energies_key: "O_i"
    enabled_events: ["migration", "reaction", "generation"]
    interface_tolerance_generation: null
    sites_generation_layer: "top_layer"
    field_dependent_generation: True
    CN_matters: true
    electrode_scavenging:
      mass_conservation: true # Control the amount of O_i scavenged and injected
    description: "Oxygen defect in interstitial"
    
  lattice_oxygen:
    symbol: "O"
    charge: 0
    site_type: "O"
    allowed_sublattices: ["O"]
    initial_concentration_bulk: 0
    initial_concentration_GB: 0
    valid_target_species: []
    activation_energies_key: 'lattice_O'
    enabled_events: ['reaction']
    CN_matters: false
    description: 'Regular lattice oxygen atom'

  oxygen_vacancy:
    symbol: "V_O"
    charge: 2
    site_type: "O"
    allowed_sublattices: ["O"]
    initial_concentration_bulk: 0.0e-2
    initial_concentration_GB: 0.0e-2
    valid_target_species: ["O"]
    activation_energies_key: "V_O"
    enabled_events: ["reaction"]
    CN_matters: false
    passivation_level: null
    max_passivation_level: null
    charge_per_passivation: null
    description: "Vacancy in oxide lattice"